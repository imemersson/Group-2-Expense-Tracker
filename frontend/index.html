<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense Tracker - Login</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    /* simple centered auth layout (keeps your existing style.css untouched) */
    .auth-wrap { min-height: 100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
    .auth-card { width:100%; max-width:420px; }
    .auth-tabs { display:flex; gap:8px; margin-bottom:16px; }
    .auth-tabs button { flex:1; }
    .hidden { display:none; }
  </style>
</head>
<body>
  <div class="auth-wrap">
    <div class="card auth-card">
      <h2 style="margin-bottom: 16px;">Expense Tracker</h2>

      <div class="auth-tabs">
        <button class="btn btn-primary" id="tabLogin">Login</button>
        <button class="btn btn-secondary" id="tabRegister">Register</button>
      </div>

      <p id="authMsg" style="margin: 8px 0 16px; color: #b91c1c;"></p>

      <!-- LOGIN -->
      <form id="loginForm">
        <div class="form-group">
          <label>Email</label>
          <input id="loginEmail" type="email" required />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input id="loginPassword" type="password" required />
        </div>
        <button class="btn btn-primary" type="submit" style="width:100%;">Login</button>
      </form>

      <!-- REGISTER -->
      <form id="registerForm" class="hidden">
        <div class="form-group">
          <label>Name</label>
          <input id="regName" type="text" required />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input id="regEmail" type="email" required />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input id="regPassword" type="password" required minlength="6" />
        </div>
        <button class="btn btn-success" type="submit" style="width:100%;">Create Account</button>
      </form>
    </div>
  </div>

  <script>
    const API = "http://localhost:5000"; // adjust if needed

    // If already logged in, go straight to dashboard
    if (localStorage.getItem("token")) {
      window.location.href = "dashboard.html";
    }

    const tabLogin = document.getElementById("tabLogin");
    const tabRegister = document.getElementById("tabRegister");
    const loginForm = document.getElementById("loginForm");
    const registerForm = document.getElementById("registerForm");
    const authMsg = document.getElementById("authMsg");

    tabLogin.onclick = () => {
      authMsg.textContent = "";
      loginForm.classList.remove("hidden");
      registerForm.classList.add("hidden");
      tabLogin.classList.add("btn-primary");
      tabLogin.classList.remove("btn-secondary");
      tabRegister.classList.add("btn-secondary");
      tabRegister.classList.remove("btn-primary");
    };

    tabRegister.onclick = () => {
      authMsg.textContent = "";
      registerForm.classList.remove("hidden");
      loginForm.classList.add("hidden");
      tabRegister.classList.add("btn-primary");
      tabRegister.classList.remove("btn-secondary");
      tabLogin.classList.add("btn-secondary");
      tabLogin.classList.remove("btn-primary");
    };

    loginForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      authMsg.textContent = "";

      const email = document.getElementById("loginEmail").value.trim();
      const password = document.getElementById("loginPassword").value;

      const res = await fetch(`${API}/api/auth/login`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password })
      });

      const data = await res.json();
      if (!res.ok) {
        authMsg.textContent = data.message || "Login failed";
        return;
      }

      localStorage.setItem("token", data.token);
      localStorage.setItem("userName", data.user.name);
      window.location.href = "dashboard.html";
    });

    registerForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      authMsg.textContent = "";

      const name = document.getElementById("regName").value.trim();
      const email = document.getElementById("regEmail").value.trim();
      const password = document.getElementById("regPassword").value;

      const res = await fetch(`${API}/api/auth/register`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name, email, password })
      });

      const data = await res.json();
      if (!res.ok) {
        authMsg.textContent = data.message || "Registration failed";
        return;
      }

      // auto-login after register (optional but nice)
      localStorage.setItem("token", data.token);
      localStorage.setItem("userName", data.user.name);
      window.location.href = "dashboard.html";
    });
  </script>
</body>
</html>
